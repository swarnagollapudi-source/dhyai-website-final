            <nav class="nav-links">

    <section class="hero" style="background-image: url('dhyai_home_hero_jali-shadow-wide_01.jpg');">
        <div class="hero-overlay"></div>
        <div class="container grid-2" style="width: 100%; align-items: flex-end;">
            <div>
                <h1>Enquiry</h1>
                <p>To begin a conversation.<br>Write to the studio.</p>
                <div style="margin-top: 3rem;">
                    <p class="serif" style="font-size: 24px; color: var(--accent-gold); margin-bottom: 0.5rem;">Dhyai Studio</p>

            </div>
            
            <div style="background-color: rgba(11,10,8,0.6); padding: 48px;">
                <form action="#" method="POST">
                    <input type="text" placeholder="Name" required>
                    <input type="email" placeholder="Email" required>
                    <input type="text" placeholder="Subject">
                    <textarea rows="3" placeholder="Message" required></textarea>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
