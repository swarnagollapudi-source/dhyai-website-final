<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark">
    <nav>
        <a onclick="show('home')">HOME</a>
        <a onclick="show('studio')">STUDIO</a>
        <a onclick="show('material')">MATERIAL</a>
        <a onclick="show('studies')">STUDIES</a>
        <a onclick="show('objects')">OBJECTS</a>
        <a onclick="show('enquiry')">ENQUIRY</a>
    </nav>

    <div id="home" class="page active">
        <section style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <img src="dhyai_brand_logo_gold-black_01.png" style="width: 180px;">
            <h1>ध्यै</h1>
            <p>To fix the mind upon.</p>
        </section>
        <section class="container">
            <p>A stone from a riverbed sits on the shelf for years. Time, embodied in material. Objects meant to live with.</p>
        </section>
    </div>

    <div id="studio" class="page">
        <section class="container">
            <h1>The Studio</h1>
            <p>DHYAI is a material and surface design practice based in Bengaluru.</p>
            <img src="dhyai_studio_stacking_atmosphere-6.jpg">
        </section>
    </div>

    <div id="studies" class="page" style="background: #D1C2A0; color: #2A1E18;">
        <section class="container">
            <h1>Studies</h1>
            <div class="grid-2">
                <img src="dhyai_sthana_studies_pillow_bs_1.jpg">
                <img src="dhyai_sthiti_studies_flatlay_bs_1.jpg">
            </div>
        </section>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.body.className = (id === 'studies' || id === 'enquiry') ? 'light' : 'dark';
        }
    </script>
</body>
</html>
